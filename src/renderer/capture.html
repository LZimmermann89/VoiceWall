<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!--
      Aktive CSP des CAPTURE-FENSTERS (verstecktes Aufnahmefenster).
      Das einzige Fenster mit worker-/media-/blob-Ausnahmen:
      - script-src 'self' blob:: Chromium prueft AudioWorklet-Module gegen
        script-src, NICHT gegen worker-src. Ohne blob: schlaegt addModule
        mit "Unable to load a worklet's module." fehl (empirisch belegt in
        Electron 43). blob: gilt nur in
        diesem versteckten Fenster ohne jeden Nutzerinhalt; blob:-URLs sind
        immer lokal erzeugt, nie ein Netzwerk-Kanal, und connect-src 'self'
        blockiert weiterhin jede Exfiltration.
      - worker-src/child-src blob:: derselbe Blob-Weg fuer Worker-Kontexte
        (file://-Falle unter Electron).
      - media-src 'self' blob:: Medienquellen des getUserMedia-/Worklet-Pfads
        bleiben lokal; externe Medien-Hosts sind verboten.
      - connect-src 'self': keine externen Requests aus dem Capture-Fenster.
      - Kein 'unsafe-inline', kein 'unsafe-eval'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; style-src 'self'; worker-src blob:; child-src blob:; media-src 'self' blob:; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>VoiceWall Audio-Capture</title>
  </head>
  <body>
    <!-- Verstecktes Fenster, keine sichtbare UI. -->
    <script type="module" src="/capture.ts"></script>
  </body>
</html>
