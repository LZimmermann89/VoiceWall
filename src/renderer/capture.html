<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!--
      Aktive CSP des CAPTURE-FENSTERS (verstecktes Aufnahmefenster),
      ABARBEITUNG 3.3. Das einzige Fenster mit worker-/media-Ausnahmen:
      - worker-src/child-src blob:: das AudioWorklet-Modul wird als Blob-URL
        geladen (file://-Falle unter Electron, siehe ABARBEITUNG 2.1).
        blob:-URLs sind immer lokal erzeugt, nie ein Netzwerk-Kanal.
      - media-src 'self' blob:: Medienquellen des getUserMedia-/Worklet-Pfads
        bleiben lokal; externe Medien-Hosts sind verboten.
      - connect-src 'self': keine externen Requests aus dem Capture-Fenster.
      - Kein 'unsafe-inline', kein 'unsafe-eval'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; worker-src blob:; child-src blob:; media-src 'self' blob:; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>VoiceWall Audio-Capture</title>
  </head>
  <body>
    <!-- Verstecktes Fenster, keine sichtbare UI. -->
    <script type="module" src="/capture.ts"></script>
  </body>
</html>
