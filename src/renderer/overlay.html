<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!--
      Aktive CSP des OVERLAY-FENSTERS ("Ich hoere zu"), ABARBEITUNG 3.3:
      harte Minimal-Policy wie im Hauptfenster, keine externen Quellen, kein
      Inline. BEWUSST kein worker-src, kein media-src, kein img-src: das
      Overlay braucht nichts davon; alles faellt auf default-src 'self'
      zurueck. connect-src 'self' verbietet jeden externen Request.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>VoiceWall Overlay</title>
    <link rel="stylesheet" href="/overlay.css" />
  </head>
  <body>
    <div id="overlay" class="overlay" data-kind="recording">
      <span id="indicator" class="indicator" aria-hidden="true"></span>
      <div class="content">
        <p id="message" class="message">Ich hoere zu ...</p>
        <button id="copy" class="copy" type="button" hidden>Kopieren</button>
      </div>
    </div>
    <script type="module" src="/overlay.ts"></script>
  </body>
</html>
